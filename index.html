<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Which Dead Poet Are You?</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink: #1a1410;
      --parchment: #f5ede0;
      --cream: #faf4ec;
      --sepia: #8b6f4e;
      --rose: #c4848a;
      --dusty-rose: #e8b4b8;
      --mocha: #3d2b1f;
      --gold: #b8965a;
      --sage: #7a8c72;
      --shadow: rgba(26, 20, 16, 0.18);
    }

    body {
      background-color: #1e1612;
      font-family: 'EB Garamond', Georgia, serif;
      color: var(--ink);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ---- BACKGROUND ---- */
    .bg-scene {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-paper {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 50% 0%, #2e1f14 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 0% 100%, #1a0f09 0%, transparent 60%),
        radial-gradient(ellipse 60% 80% at 100% 100%, #1a0f09 0%, transparent 60%),
        #120d09;
    }

    /* Candlelight glow */
    .glow-center {
      position: absolute;
      top: 30%;
      left: 50%;
      transform: translateX(-50%);
      width: 500px;
      height: 500px;
      background: radial-gradient(ellipse, rgba(184, 150, 90, 0.12) 0%, transparent 70%);
      animation: flicker 4s ease-in-out infinite alternate;
    }
    .glow-left {
      position: absolute;
      top: 60%;
      left: -5%;
      width: 300px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(196, 132, 138, 0.08) 0%, transparent 70%);
    }
    .glow-right {
      position: absolute;
      top: 60%;
      right: -5%;
      width: 300px;
      height: 400px;
      background: radial-gradient(ellipse, rgba(196, 132, 138, 0.08) 0%, transparent 70%);
    }

    @keyframes flicker {
      0%   { opacity: 0.8; transform: translateX(-50%) scale(1); }
      100% { opacity: 1;   transform: translateX(-50%) scale(1.05); }
    }

    /* Decorative SVG bookshelf silhouette at bottom */
    .shelf-silhouette {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      opacity: 0.18;
    }

    /* Floating particles (dust motes) */
    .mote {
      position: absolute;
      border-radius: 50%;
      background: rgba(184, 150, 90, 0.5);
      animation: float linear infinite;
    }

    @keyframes float {
      0%   { transform: translateY(100vh) translateX(0); opacity: 0; }
      10%  { opacity: 1; }
      90%  { opacity: 0.6; }
      100% { transform: translateY(-10vh) translateX(20px); opacity: 0; }
    }

    /* ---- CARD ---- */
    .quiz-container {
      position: relative;
      z-index: 10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .card {
      background: linear-gradient(160deg, #f7efe3 0%, #ede0cc 100%);
      border-radius: 2px;
      max-width: 620px;
      width: 100%;
      padding: 3rem 3rem 2.5rem;
      position: relative;
      box-shadow:
        0 0 0 1px rgba(139, 111, 78, 0.3),
        0 4px 6px rgba(18,13,9,0.3),
        0 20px 60px rgba(18,13,9,0.5),
        0 0 120px rgba(184, 150, 90, 0.06);
    }

    /* Torn paper edge effect top */
    .card::before {
      content: '';
      position: absolute;
      top: -1px; left: 0; right: 0;
      height: 6px;
      background: linear-gradient(90deg,
        #f7efe3 0%, #ede0cc 8%, #f5e8d5 16%, #ede0cc 24%,
        #f7efe3 32%, #ede0cc 40%, #f7efe3 48%, #ede0cc 56%,
        #f5e8d5 64%, #f7efe3 72%, #ede0cc 80%, #f7efe3 88%, #ede0cc 100%
      );
      clip-path: polygon(0% 100%, 1% 0%, 3% 80%, 5% 20%, 7% 90%, 9% 10%, 11% 70%, 13% 30%, 15% 85%, 17% 5%, 19% 75%, 21% 25%, 23% 95%, 25% 15%, 27% 80%, 29% 40%, 31% 90%, 33% 20%, 35% 70%, 37% 35%, 39% 85%, 41% 10%, 43% 75%, 45% 30%, 47% 90%, 49% 5%, 51% 80%, 53% 20%, 55% 88%, 57% 12%, 59% 72%, 61% 28%, 63% 85%, 65% 5%, 67% 78%, 69% 22%, 71% 92%, 73% 8%, 75% 68%, 77% 32%, 79% 88%, 81% 18%, 83% 75%, 85% 25%, 87% 95%, 89% 15%, 91% 70%, 93% 40%, 95% 82%, 97% 12%, 99% 60%, 100% 100%);
    }

    /* Ink stain decorative corner */
    .corner-deco {
      position: absolute;
      font-family: 'Playfair Display', serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      color: var(--sepia);
      opacity: 0.5;
      text-transform: uppercase;
    }
    .corner-tl { top: 1.2rem; left: 1.5rem; }
    .corner-tr { top: 1.2rem; right: 1.5rem; text-align: right; }

    /* Divider line */
    .divider {
      border: none;
      border-top: 0.5px solid rgba(139, 111, 78, 0.35);
      margin: 1.25rem 0;
    }

    /* ---- HEADER ---- */
    .eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--sepia);
      text-align: center;
      margin-bottom: 0.6rem;
    }

    .title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.8rem, 5vw, 2.6rem);
      font-weight: 400;
      color: var(--mocha);
      text-align: center;
      line-height: 1.2;
      margin-bottom: 0.4rem;
    }

    .title em {
      font-style: italic;
      color: var(--rose);
    }

    .subtitle {
      font-family: 'Cormorant Garamond', serif;
      font-size: 15px;
      font-style: italic;
      color: var(--sepia);
      text-align: center;
      margin-bottom: 1.5rem;
    }

    /* ---- PROGRESS ---- */
    .progress-wrap {
      margin-bottom: 1.75rem;
    }

    .progress-meta {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      letter-spacing: 0.08em;
      color: var(--sepia);
      font-family: 'Cormorant Garamond', serif;
      text-transform: uppercase;
      margin-bottom: 6px;
    }

    .progress-track {
      height: 2px;
      background: rgba(139, 111, 78, 0.2);
      border-radius: 1px;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--rose), var(--gold));
      border-radius: 1px;
      transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* ---- QUESTION ---- */
    .question-text {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.05rem, 3vw, 1.25rem);
      font-weight: 400;
      color: var(--mocha);
      line-height: 1.5;
      margin-bottom: 1.5rem;
    }

    /* ---- OPTIONS ---- */
    .options { display: flex; flex-direction: column; gap: 10px; }

    .opt {
      background: transparent;
      border: 0.5px solid rgba(139, 111, 78, 0.35);
      border-radius: 1px;
      padding: 13px 18px;
      text-align: left;
      font-family: 'EB Garamond', Georgia, serif;
      font-size: 15px;
      color: #3d2b1f;
      cursor: pointer;
      transition: all 0.2s ease;
      position: relative;
      line-height: 1.5;
    }

    .opt::before {
      content: '';
      position: absolute;
      left: 0; top: 0; bottom: 0;
      width: 0;
      background: linear-gradient(90deg, rgba(196,132,138,0.15), transparent);
      transition: width 0.25s ease;
    }

    .opt:hover {
      border-color: var(--rose);
      background: rgba(196, 132, 138, 0.06);
    }

    .opt:hover::before { width: 100%; }

    .opt.selected {
      border-color: var(--rose);
      background: rgba(196, 132, 138, 0.12);
      color: var(--mocha);
    }

    .opt.selected::after {
      content: '✦';
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--rose);
      font-size: 10px;
    }

    /* ---- RESULT ---- */
    .result-wrap { text-align: center; }

    .result-eyebrow {
      font-family: 'Cormorant Garamond', serif;
      font-size: 12px;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--sepia);
      margin-bottom: 1rem;
    }

    /* Character silhouette illustration area */
    .char-illustration {
      position: relative;
      height: 220px;
      margin: 0 -3rem 1.5rem;
      overflow: hidden;
      display: flex;
      align-items: flex-end;
      justify-content: center;
    }

    .char-svg-wrap {
      position: relative;
      z-index: 2;
    }

    .illustration-bg {
      position: absolute;
      inset: 0;
      background: linear-gradient(180deg, transparent 0%, rgba(232, 180, 184, 0.08) 100%);
    }

    /* Decorative arch behind character */
    .arch-deco {
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      z-index: 1;
    }

    .char-name-display {
      font-family: 'Playfair Display', serif;
      font-size: clamp(1.6rem, 5vw, 2.2rem);
      font-weight: 400;
      font-style: italic;
      color: var(--mocha);
      margin-bottom: 0.3rem;
    }

    .char-epithet {
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--rose);
      margin-bottom: 1rem;
    }

    .char-quote-display {
      font-family: 'Cormorant Garamond', serif;
      font-size: 17px;
      font-style: italic;
      color: var(--sepia);
      margin-bottom: 1.25rem;
      line-height: 1.6;
      padding: 0 1rem;
    }

    .char-desc-display {
      font-size: 15.5px;
      color: #5a3e2b;
      line-height: 1.8;
      margin-bottom: 1.5rem;
      text-align: left;
    }

    .traits-wrap {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      margin-bottom: 1.75rem;
    }

    .trait {
      font-family: 'Cormorant Garamond', serif;
      font-size: 11px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--sepia);
      border: 0.5px solid rgba(139, 111, 78, 0.4);
      padding: 4px 12px;
      border-radius: 1px;
    }

    .restart-btn {
      background: transparent;
      border: 0.5px solid rgba(139, 111, 78, 0.5);
      padding: 11px 32px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 13px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--sepia);
      cursor: pointer;
      transition: all 0.2s;
    }

    .restart-btn:hover {
      border-color: var(--rose);
      color: var(--rose);
      background: rgba(196, 132, 138, 0.05);
    }

    /* ---- INTRO SCREEN ---- */
    .intro-wrap { text-align: center; }

    .intro-illustration {
      margin: 0 -3rem 1.5rem;
      height: 200px;
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .start-btn {
      background: transparent;
      border: 0.5px solid var(--rose);
      padding: 13px 40px;
      font-family: 'Cormorant Garamond', serif;
      font-size: 14px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
      color: var(--rose);
      cursor: pointer;
      transition: all 0.2s;
      margin-top: 0.5rem;
    }

    .start-btn:hover {
      background: rgba(196, 132, 138, 0.1);
    }

    .intro-body {
      font-size: 15.5px;
      color: #5a3e2b;
      line-height: 1.9;
      margin-bottom: 1.5rem;
      font-style: italic;
    }

    @media (max-width: 500px) {
      .card { padding: 2rem 1.5rem 2rem; }
      .char-illustration { margin: 0 -1.5rem 1.5rem; }
      .intro-illustration { margin: 0 -1.5rem 1.5rem; }
    }
  </style>
</head>

<!-- QUIZ CARD -->
<div class="quiz-container">
  <div class="card">
    <span class="corner-deco corner-tl">Welton Academy</span>
    <span class="corner-deco corner-tr">Est. 1959</span>
    <div id="quiz-root"></div>
  </div>
</div>

<script>
  // Dust motes
  const motesEl = document.getElementById('motes');
  for (let i = 0; i < 18; i++) {
    const m = document.createElement('div');
    m.className = 'mote';
    const sz = Math.random() * 2.5 + 1;
    m.style.cssText = `
      width:${sz}px; height:${sz}px;
      left:${Math.random()*100}%;
      animation-duration:${Math.random()*18+12}s;
      animation-delay:${Math.random()*12}s;
      opacity:${Math.random()*0.5+0.2};
    `;
    motesEl.appendChild(m);
  }

  // ---- DATA ----
  const questions = [
    {
      q: "It's a free afternoon at Welton. What do you do?",
      opts: [
        { text: "Write something — a poem, a story, whatever comes out", chars: { neil: 2, todd: 2, keating: 1 } },
        { text: "Sneak out and find an adventure", chars: { neil: 3, charlie: 3 } },
        { text: "Study ahead — you like being prepared", chars: { cameron: 3, pitts: 1 } },
        { text: "Sit somewhere quiet and just think", chars: { todd: 3, meeks: 1 } }
      ]
    },
    {
      q: "Someone dares you to do something risky but thrilling. You:",
      opts: [
        { text: "Do it immediately, no hesitation", chars: { charlie: 3, neil: 2 } },
        { text: "Think it through carefully, then do it anyway", chars: { neil: 2, keating: 2 } },
        { text: "Cheer the others on but hang back yourself", chars: { todd: 2, meeks: 1 } },
        { text: "Remind everyone of the consequences", chars: { cameron: 3, pitts: 1 } }
      ]
    },
    {
      q: "How do you handle authority you deeply disagree with?",
      opts: [
        { text: "Quietly find ways around it", chars: { neil: 2, todd: 1, keating: 1 } },
        { text: "Challenge it openly, rules or not", chars: { charlie: 3, keating: 2 } },
        { text: "Work within it — systems exist for a reason", chars: { cameron: 3 } },
        { text: "Feel frustrated but stay silent", chars: { todd: 3, meeks: 1 } }
      ]
    },
    {
      q: "Your friends would describe you as:",
      opts: [
        { text: "The passionate one — full of ideas and energy", chars: { neil: 3, charlie: 1 } },
        { text: "The wild card — unpredictable and delightfully bold", chars: { charlie: 3 } },
        { text: "The quiet one who surprises everyone", chars: { todd: 3 } },
        { text: "The reliable one — always prepared, always there", chars: { cameron: 2, meeks: 2, pitts: 1 } }
      ]
    },
    {
      q: "What matters most to you?",
      opts: [
        { text: "Following your passion, wherever it leads", chars: { neil: 3, keating: 2 } },
        { text: "Living freely and refusing to be contained", chars: { charlie: 3, keating: 1 } },
        { text: "Finding your own voice, at last", chars: { todd: 3 } },
        { text: "Security and a clear, certain future", chars: { cameron: 3, pitts: 1 } }
      ]
    },
    {
      q: "When something moves you deeply, you:",
      opts: [
        { text: "Channel it into art or performance immediately", chars: { neil: 3, keating: 1 } },
        { text: "Share it loudly with everyone around you", chars: { charlie: 2, neil: 1 } },
        { text: "Keep it inside — feelings are a private thing", chars: { todd: 3, meeks: 1 } },
        { text: "Analyze why it affected you so much", chars: { keating: 2, cameron: 1 } }
      ]
    },

  // ---- QUIZ LOGIC ----
  let state = 'intro';
  let current = 0;
  let scores = {};

  function resetScores() {
    scores = { neil: 0, todd: 0, charlie: 0, keating: 0, cameron: 0, meeks: 0, pitts: 0 };
  }

  function getWinner() {
    return Object.entries(scores).sort((a, b) => b[1] - a[1])[0][0];
  }

  const root = document.getElementById('quiz-root');

  function renderIntro() {
    root.innerHTML = `
      <div class="intro-wrap">
        <div class="eyebrow">A Personality Quiz</div>
        <h1 class="title">Which <em>Dead Poet</em><br>Are You?</h1>
        <p class="subtitle">O captain, my captain — let us find out.</p>
        <hr class="divider"/>
        <div class="intro-illustration">
          <svg width="420" height="180" viewBox="0 0 420 180" fill="none" xmlns="http://www.w3.org/2000/svg">
            <!-- Five silhouettes standing on desks -->
            ${drawGroupSilhouette()}
            <!-- Stars / floating words -->
            <text x="50" y="30" font-family="Playfair Display, serif" font-size="11" fill="#c4848a" opacity="0.6" font-style="italic">carpe diem</text>
            <text x="310" y="40" font-family="Playfair Display, serif" font-size="11" fill="#b8965a" opacity="0.6" font-style="italic">seize the day</text>
            <text x="170" y="20" font-family="Playfair Display, serif" font-size="10" fill="#8b6f4e" opacity="0.5" font-style="italic">o captain</text>
            <!-- Candle flames -->
            <ellipse cx="30" cy="155" rx="3" ry="2" fill="#f5a623" opacity="0.7"/>
            <path d="M30 153 Q31 146 30 140 Q29 146 30 153Z" fill="#f5a623" opacity="0.8"/>
            <rect x="28" y="155" width="4" height="18" fill="#f5ede0" opacity="0.5"/>
            <ellipse cx="390" cy="155" rx="3" ry="2" fill="#f5a623" opacity="0.7"/>
            <path d="M390 153 Q391 146 390 140 Q389 146 390 153Z" fill="#f5a623" opacity="0.8"/>
            <rect x="388" y="155" width="4" height="18" fill="#f5ede0" opacity="0.5"/>
          </svg>
        </div>
        <p class="intro-body">Eight questions. Seven poets. One answer that might just surprise you.<br>We don't just study poetry here. We let it drip from our tongues like honey.</p>
        <hr class="divider"/>
        <button class="start-btn" onclick="startQuiz()">Begin ✦</button>
      </div>
    `;
  }

  function drawGroupSilhouette() {
    const chars = [
      { x: 40,  y: 170, scale: 0.52, color: '#c4848a' },
      { x: 112, y: 155, scale: 0.58, color: '#8b6f4e' },
      { x: 192, y: 148, scale: 0.62, color: '#7a8c72' },
      { x: 268, y: 155, scale: 0.56, color: '#b8965a' },
      { x: 342, y: 168, scale: 0.50, color: '#9b7a5a' },
    ];
    const arms = chars.map(c => `
      <g transform="translate(${c.x}, ${c.y}) scale(${c.scale}) translate(-65, -195)">
        <!-- Simple standing figure -->
        <ellipse cx="65" cy="28" rx="18" ry="20" fill="${c.color}"/>
        <rect x="59" y="47" width="12" height="10" fill="${c.color}"/>
        <path d="M36 56 Q53 50 65 52 Q77 50 94 56 L99 140 L31 140Z" fill="${c.color}"/>
        <path d="M48 140 L43 195 L59 195 L65 158 L71 158 L77 195 L87 195 L82 140Z" fill="${c.color}"/>
      </g>
    `).join('');
    // Desk lines
    const desks = chars.map(c => `
      <rect x="${c.x - 22}" y="${c.y}" width="44" height="5" rx="1" fill="${c.color}" opacity="0.25"/>
    `).join('');
    return arms + desks;
  }

  function renderQuestion() {
    const q = questions[current];
    const pct = (current / questions.length) * 100;
    root.innerHTML = `
      <div class="eyebrow">Dead Poets Society</div>
      <h1 class="title" style="font-size:1.5rem; margin-bottom:0.2rem;">Which poet are you?</h1>
      <hr class="divider"/>
      <div class="progress-wrap">
        <div class="progress-meta">
          <span>Question ${current + 1} of ${questions.length}</span>
          <span>${Math.round(pct)}%</span>
        </div>
        <div class="progress-track"><div class="progress-fill" style="width:${pct}%"></div></div>
      </div>
      <p class="question-text">${q.q}</p>
      <div class="options">
        ${q.opts.map((o, i) => `<button class="opt" onclick="pick(${i})">${o.text}</button>`).join('')}
      </div>
    `;
  }

  function renderResult() {
    const key = getWinner();
    const c = characters[key];
    root.innerHTML = `
      <div class="result-wrap">
        <div class="result-eyebrow">You are...</div>
        <div class="char-illustration">
          <div class="illustration-bg"></div>
          <svg class="arch-deco" width="300" height="200" viewBox="0 0 300 200" fill="none">
            <path d="M10 200 Q10 80 150 60 Q290 80 290 200Z" fill="${c.color}" opacity="0.06"/>
            <path d="M40 200 Q40 100 150 85 Q260 100 260 200Z" stroke="${c.color}" stroke-width="0.5" fill="none" opacity="0.2"/>
          </svg>
          <div class="char-svg-wrap">
            ${c.svgChar(c.color)}
          </div>
        </div>
        <h2 class="char-name-display">${c.name}</h2>
        <div class="char-epithet">✦ ${c.epithet} ✦</div>
        <p class="char-quote-display">${c.quote}</p>
        <hr class="divider"/>
        <p class="char-desc-display">${c.desc}</p>
        <div class="traits-wrap">
          ${c.traits.map(t => `<span class="trait">${t}</span>`).join('')}
        </div>
        <hr class="divider"/>
        <button class="restart-btn" onclick="restart()">Try Again ✦</button>
      </div>
    `;
  }

  function startQuiz() {
    current = 0;
    resetScores();
    state = 'quiz';
    renderQuestion();
  }

  function pick(i) {
    const chosen = questions[current].opts[i];
    Object.entries(chosen.chars).forEach(([ch, v]) => { scores[ch] = (scores[ch] || 0) + v; });
    const btns = document.querySelectorAll('.opt');
    btns.forEach((b, j) => {
      b.onclick = null;
      if (j === i) b.classList.add('selected');
    });
    setTimeout(() => {
      current++;
      if (current >= questions.length) {
        state = 'result';
        renderResult();
      } else {
        renderQuestion();
      }
    }, 380);
  }

  function restart() {
    state = 'intro';
    renderIntro();
  }

  renderIntro();
</script>
